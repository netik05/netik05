name: Metrics
on:
  # Regenerate daily
  schedule:
    - cron: "0 18 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate whenever the profile changes
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # ── Main stats card: overview + languages + calendar + achievements ──
      - name: Stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: netik05
          filename: github-metrics.svg
          committer_branch: main
          config_timezone: Australia/Sydney
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes

      # ── Featured repositories card (replaces the old pin cards) ──
      - name: Featured repositories card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: netik05
          filename: github-metrics-repos.svg
          committer_branch: main
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: netik05/Audio-Detection-System, netik05/comp4601-silicon-pulse, netik05/Collegiate-Expense-Buddy, netik05/Weights-before-dates
